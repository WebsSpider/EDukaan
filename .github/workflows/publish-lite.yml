name: Publish Lite

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: >
          Git tag to build from and attach assets to (e.g. v0.1.3). Required to
          upload to an existing GitHub Release. Leave empty to build the default
          branch only (artifacts stay in the workflow run, no release upload).
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && (
        startsWith(github.event.release.tag_name, 'publish-lite') ||
        (startsWith(github.event.release.tag_name, 'v') && contains(github.event.release.tag_name, '.'))
      ))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-15-intel
            build_cmd: yarn build --mac --publish never
          - name: Linux
            os: ubuntu-latest
            build_cmd: yarn build --linux --publish never
          - name: Windows
            os: windows-2022
            build_cmd: yarn build --win --publish never

    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: Resolve checkout ref
        id: checkout_ref
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            echo "ref=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.checkout_ref.outputs.ref }}

      - name: Install dependencies
        shell: bash
        run: |
          yarn set version 1.22.18
          yarn

      - name: Stub log_creds.txt for packaging
        shell: bash
        run: |
          # Required by electron-builder extraResources (gitignored locally; see electron-builder-config.mjs).
          printf '\n\n\n\n' > log_creds.txt

      - name: Build unsigned distributables
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_NOTARIZE: '0'
        run: ${{ matrix.build_cmd }}

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundled-${{ matrix.name }}
          path: dist_electron/bundled/**
          if-no-files-found: error

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'release' && (
        startsWith(github.event.release.tag_name, 'publish-lite') ||
        (startsWith(github.event.release.tag_name, 'v') && contains(github.event.release.tag_name, '.'))
      )) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      # Only versioned installer names — avoid **/*.exe (duplicates EDukan.exe / elevate.exe from unpacked dirs).
      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: |
            release-assets/**/EDukan-v*.dmg
            release-assets/**/EDukan-v*.zip
            release-assets/**/EDukan-v*.exe
            release-assets/**/EDukan-v*.AppImage
            release-assets/**/EDukan-v*.deb
            release-assets/**/EDukan-v*.rpm
            release-assets/**/EDukan-v*.blockmap
            release-assets/**/latest*.yml
          generate_release_notes: false
          fail_on_unmatched_files: false
