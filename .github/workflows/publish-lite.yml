name: Publish Lite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-15-intel
            build_cmd: yarn build --mac --publish never
          - name: Linux
            os: ubuntu-latest
            build_cmd: yarn build --linux --publish never
          - name: Windows
            os: windows-2022
            build_cmd: yarn build --win --publish never

    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          yarn set version 1.22.18
          yarn

      - name: Build unsigned distributables
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_NOTARIZE: 0
        run: ${{ matrix.build_cmd }}

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundled-${{ matrix.name }}
          path: dist_electron/bundled/**
          if-no-files-found: error

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
